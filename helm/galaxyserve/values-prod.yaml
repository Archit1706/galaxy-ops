# Production overrides for the GalaxyServe chart.
# Applied on top of values.yaml (e.g. `helm install ... -f values.yaml -f values-prod.yaml`,
# or via the ArgoCD Application's valueFiles).

# Start with headroom; the HPA scales between min and max.
replicaCount: 3

image:
  pullPolicy: IfNotPresent

# Higher floor and ceiling for production load.
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 65

# Keep a majority available during disruptions.
podDisruptionBudget:
  enabled: true
  minAvailable: 2

resources:
  requests:
    cpu: 500m
    memory: 768Mi
  limits:
    cpu: "2"
    memory: 1536Mi

# Spread replicas across nodes so a single node failure can't take the service down.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: galaxyserve

# In production, load the Production model from the MLflow registry.
galaxyserve:
  logLevel: info
  registry:
    enabled: true
    mlflowTrackingUri: "http://mlflow.galaxyserve.svc.cluster.local:5000"
    stage: Production

ingress:
  hosts:
    - host: galaxyserve.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: galaxyserve-tls
      hosts:
        - galaxyserve.example.com
