{{- if .Values.prometheusRule.enabled -}}
{{- $budget := subf 1.0 .Values.prometheusRule.slo.availabilityObjective -}}
{{- $latency := .Values.prometheusRule.slo.latencyBucketSeconds -}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "galaxyserve.fullname" . }}-slo
  labels:
    {{- include "galaxyserve.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: galaxyserve.slo
      rules:
        # ---- Multi-window, multi-burn-rate availability alerts ----
        - alert: GalaxyServeErrorBudgetBurnFast
          expr: |
            (
              sum(rate(galaxyserve_requests_total{status=~"5.."}[1h]))
              / sum(rate(galaxyserve_requests_total[1h]))
            ) > ({{ mulf 14.4 $budget }})
            and
            (
              sum(rate(galaxyserve_requests_total{status=~"5.."}[5m]))
              / sum(rate(galaxyserve_requests_total[5m]))
            ) > ({{ mulf 14.4 $budget }})
          for: 2m
          labels:
            severity: critical
            slo: availability
          annotations:
            summary: "GalaxyServe is burning its error budget fast (14.4x)"
            description: "5xx ratio over 1h and 5m exceeds 14.4x the {{ .Values.prometheusRule.slo.availabilityObjective }} SLO budget. ~2% of the monthly budget per hour."
            runbook: "https://github.com/Archit1706/galaxy-ops/blob/master/docs/runbook.md#alert-galaxyserveerrorbudgetburnfast-page"

        - alert: GalaxyServeErrorBudgetBurnSlow
          expr: |
            (
              sum(rate(galaxyserve_requests_total{status=~"5.."}[6h]))
              / sum(rate(galaxyserve_requests_total[6h]))
            ) > ({{ mulf 6.0 $budget }})
            and
            (
              sum(rate(galaxyserve_requests_total{status=~"5.."}[30m]))
              / sum(rate(galaxyserve_requests_total[30m]))
            ) > ({{ mulf 6.0 $budget }})
          for: 15m
          labels:
            severity: critical
            slo: availability
          annotations:
            summary: "GalaxyServe is burning its error budget (6x sustained)"
            description: "5xx ratio over 6h and 30m exceeds 6x the SLO budget."
            runbook: "https://github.com/Archit1706/galaxy-ops/blob/master/docs/runbook.md#alert-galaxyserveerrorbudgetburnslow-page"

        # ---- Latency SLO ----
        - alert: GalaxyServeHighLatency
          expr: |
            histogram_quantile(
              0.95,
              sum(rate(galaxyserve_request_latency_seconds_bucket{endpoint="/predict"}[5m])) by (le)
            ) > {{ $latency }}
          for: 10m
          labels:
            severity: warning
            slo: latency
          annotations:
            summary: "GalaxyServe p95 /predict latency above {{ $latency }}s"
            description: "p95 latency on /predict has exceeded the {{ $latency }}s SLO for 10m."
            runbook: "https://github.com/Archit1706/galaxy-ops/blob/master/docs/runbook.md#alert-galaxyservehighlatency"

        # ---- Reliability ----
        - alert: GalaxyServeCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}", container="galaxyserve"}[10m]) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "GalaxyServe pod is restarting repeatedly"
            description: "A GalaxyServe container has restarted more than twice in 10m (CrashLoopBackOff suspected)."
            runbook: "https://github.com/Archit1706/galaxy-ops/blob/master/docs/runbook.md#alert-galaxyservecrashlooping"

        - alert: GalaxyServeAbsent
          expr: absent(up{job=~".*galaxyserve.*"} == 1)
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "GalaxyServe scrape target is absent"
            description: "Prometheus has no healthy GalaxyServe target — the service may be down or unscrapeable."
            runbook: "https://github.com/Archit1706/galaxy-ops/blob/master/docs/runbook.md#alert-galaxyserveabsent"

        - alert: GalaxyServeModelNotLoaded
          expr: galaxyserve_model_loaded == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "GalaxyServe has no model loaded"
            description: "galaxyserve_model_loaded == 0 — readiness will stay 503. Check weights mount or MLflow registry."
            runbook: "https://github.com/Archit1706/galaxy-ops/blob/master/docs/runbook.md#model-not-loaded-health-returns-503"
{{- end }}
