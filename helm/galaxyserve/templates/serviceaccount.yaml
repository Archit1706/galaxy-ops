{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "galaxyserve.serviceAccountName" . }}
  labels:
    {{- include "galaxyserve.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The app needs no Kubernetes API access; do not auto-mount the token.
automountServiceAccountToken: false
{{- end }}
