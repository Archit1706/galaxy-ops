# Loki + Promtail for logs, in single-binary mode (filesystem storage) — enough
# to ship and query GalaxyServe logs in Grafana for the demo, without standing up
# object storage. Grafana (from the monitoring app) auto-discovers the Loki
# datasource via the label in values-loki.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: galaxyops
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: 6.10.0
      helm:
        releaseName: loki
        valueFiles:
          - $values/monitoring/values-loki.yaml
    - repoURL: https://github.com/Archit1706/galaxy-ops
      targetRevision: master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
