# kube-prometheus-stack (Prometheus + Grafana + Alertmanager + node-exporter +
# kube-state-metrics). Multi-source Application: the chart comes from the
# prometheus-community Helm repo, the values file from this git repo.
#
# releaseName is pinned to "kps" so the operator's serviceMonitorSelector
# (release=kps) matches the ServiceMonitor/PrometheusRule labels the chart emits.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: galaxyops
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 62.7.0
      helm:
        releaseName: kps
        valueFiles:
          - $values/monitoring/values-kps.yaml
    - repoURL: https://github.com/Archit1706/galaxy-ops
      targetRevision: master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # CRDs are large; server-side apply avoids the annotation size limit.
      - ServerSideApply=true
