# ArgoCD bootstrap (non-Terraform path).
#
# The local quickstart installs ArgoCD via Terraform (terraform/main.tf). If you
# instead want to install it by hand on an existing cluster, apply this namespace
# and then the upstream install manifest:
#
#   kubectl apply -f argocd/bootstrap.yaml
#   kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
#   kubectl -n argocd rollout status deploy/argocd-server
#
# Then hand the cluster to GitOps:
#
#   kubectl apply -f argocd/project.yaml
#   kubectl apply -f argocd/apps/root-app.yaml
#
# Get the initial admin password:
#   kubectl -n argocd get secret argocd-initial-admin-secret \
#     -o jsonpath='{.data.password}' | base64 -d ; echo
apiVersion: v1
kind: Namespace
metadata:
  name: argocd
  labels:
    app.kubernetes.io/part-of: galaxyops
