# Loki values — single-binary mode with filesystem storage. Enough to ship and
# query GalaxyServe logs locally without standing up object storage (S3/GCS).
# For production, switch to the 'distributed' or 'simple-scalable' deployment
# mode with an object-store backend.

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    retention_period: 168h # 7 days

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  persistence:
    enabled: false

# Disable the scalable-mode components (we run single-binary).
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Self-monitoring/canary add noise on a laptop; turn them off for the demo.
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
lokiCanary:
  enabled: false
test:
  enabled: false

chunksCache:
  enabled: false
resultsCache:
  enabled: false
